[uwsgi]

# ==============================================
# 1. 基础路径与项目入口
# ==============================================
chdir = /var/www/maneu-admin
module = maneu.wsgi:application

# ==============================================
# 2. 网络通信（Unix Socket）
# ==============================================
socket = /var/www/maneu-admin/uwsgi.sock
chmod-socket = 660
chown-socket = www-data:www-data

# 【新增】设置 socket 的读写超时，防止长连接挂起
socket-timeout = 30

# 【新增】增加缓冲区大小，适应大请求头（默认 4096 可能不够）
buffer-size = 32768

# ==============================================
# 3. 进程与线程（动态调整）
# ==============================================
master = true

# 【进程数】建议根据服务器实际 CPU 核数调整
# 假设 4 核，processes = 2 * 4 + 1 = 9
processes = 9

threads = 2

# 【内存泄漏防护】
max-requests = 5000

# 【新增】每个 worker 最大存活时间（秒），超过后重启
max-worker-lifetime = 86400   # 24 小时

# 【新增】当内存占用超过 RSS 限制（MB）时重启 worker
reload-on-rss = 1024          # 1GB（请根据实际内存调整）

listen = 128

# ==============================================
# 4. 超时与缓冲
# ==============================================
harakiri = 60
harakiri-verbose = true
post-buffering = 8192

# 【新增】限制请求体大小，与 Nginx 的 client_max_body_size 保持一致
limit-post = 78643200         # 75MB

# ==============================================
# 5. 安全与权限
# ==============================================
uid = www-data
gid = www-data
thunder-lock = true
enable-threads = true

# ==============================================
# 6. 日志系统（**关键优化：独立日志文件**）
# ==============================================
# 【优化】日志文件名加 -admin 后缀，与 guest 站点区分
daemonize = /var/log/uwsgi/maneu-admin.log
log-maxsize = 50000000        # 50MB 自动轮转
log-date = true

pidfile = /var/www/maneu-admin/uwsgi.pid
vacuum = true

# 【新增】启用 stats 服务，便于监控（可选）
# stats = 127.0.0.1:1718      # 注意端口与 guest 不同

# ==============================================
# 7. 环境变量
# ==============================================
env = DJANGO_SETTINGS_MODULE=maneu.settings

# 如果使用虚拟环境，取消注释并指向正确路径
# home = /path/to/venv
# pythonpath = /path/to/venv/lib/python3.x/site-packages

# ==============================================
# 8. 运维辅助
# ==============================================
# 【新增】进程名前缀，便于 ps 区分
procname-prefix = [uwsgi-admin]
auto-procname = true

# 【新增】配置变更时自动重载（配合 touch-reload 文件）
# touch-reload = /var/www/maneu-admin/reload.trigger

# 【优化】优雅重启时的等待时间（**修正格式，去掉行首空格**）
reload-mercy = 10
worker-reload-mercy = 10