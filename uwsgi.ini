[uwsgi]

# ==============================================
# 1. 基础路径与项目入口
# ==============================================

# 项目工作目录（强烈建议不要放在 /root/ 下，建议移至 /var/www/ 并授权给 www-data）
chdir = /var/www/maneu-admin

# Django 项目的 WSGI 入口 (指向项目同名文件夹下的 wsgi.py)
module = maneu.wsgi:application

# ==============================================
# 2. 网络通信（性能关键点）
# ==============================================

# 【推荐】使用 Unix Socket 代替 TCP 端口。
# 优点：绕过网络协议栈，减少上下文切换，性能比 127.0.0.1:8003 高约 10%~15%。
socket = /var/www/maneu-admin/uwsgi.sock

# 如果因特殊原因必须用 TCP 端口，请注释掉上面那行，启用下面这行：
# socket = 127.0.0.1:8003

# 【重要】设置 Socket 文件权限，让 Nginx 有权限读取（Nginx 通常以 www-data 运行）
chmod-socket = 660
chown-socket = www-data:www-data

# ==============================================
# 3. 进程与线程（CPU密集型 vs IO密集型）
# ==============================================

# 启用主进程（管理子进程，必须开启）
master = true

# 【进程数计算法则】
# 如果项目是 CPU 密集型（复杂计算）：设为 CPU 核数。
# 如果项目是 IO 密集型（数据库查询、网络请求）：设为 (2 * CPU核数) + 1。
# 假设服务器为 4 核且偏重 IO 查询，这里设为 9；如果是 2 核设为 5。
processes = 9

# 【线程数】每个进程开启 2 个线程。
# 开启后，总并发处理能力 = processes * threads = 18。
# 对于包含 Django ORM 查询的场景，线程能有效减少 IO 等待带来的阻塞。
threads = 2

# 【内存泄漏防护】处理完 5000 个请求后，主动回收该进程并重启。
# 防止 Python 内存碎片累积导致内存占用过高（Django 常见问题）。
max-requests = 5000

# 【请求队列长度】当并发量瞬间暴涨时，允许在 socket 队列中等待的请求数。
# 调大此值可减少 502 Bad Gateway，但需配合 Nginx 的 backlog。
listen = 128

# ==============================================
# 4. 超时机制与缓冲（防止请求卡死）
# ==============================================

# 【自杀时间】单个请求最长执行 60 秒。
# 超过 60 秒 uWSGI 将强制结束该工作进程（并自动重启），比原 30 秒更宽容。
# 注意：此时间必须小于等于 Nginx 中的 uwsgi_read_timeout。
harakiri = 60
harakiri-verbose = true  # 输出被强杀的日志，便于排查慢接口

# 【请求体缓冲】当接收 POST 上传数据时，缓冲到 8192 字节后再交付给 Django。
# 原 4096 偏小，8192 能减少频繁的系统调用，提升上传性能。
# 若涉及大文件上传（>10MB），建议调整至 32768。
post-buffering = 8192

# ==============================================
# 5. 安全与权限（绝对禁止使用 root！！！）
# ==============================================

# 启动后降权运行。请确保系统存在 www-data 用户组。
uid = www-data
gid = www-data

# 【安全开关】当异常发生时，将请求交给下一个进程处理，避免单个请求堵塞全局。
thunder-lock = true

# 【Python GIL 应对】启用线程支持，配合 threads=2 必须开启。
enable-threads = true

# ==============================================
# 6. 日志系统（运维必看）
# ==============================================

# 后台运行并将日志写入文件
daemonize = /var/log/uwsgi/maneu.log

# 【日志自动切割】单日志文件超过 50MB 时自动重命名轮转，防止磁盘写满。
log-maxsize = 50000000

# 每条日志带上时间戳，便于排查故障时间点。
log-date = true

# 进程 PID 记录文件，用于平滑重启 (kill -HUP)
pidfile = /var/www/maneu-admin/uwsgi.pid

# 【优雅清理】停止服务时自动移除 Socket 文件和 PID 文件。
vacuum = true

# ==============================================
# 7. 环境变量扩展（可选但推荐）
# ==============================================

# 显式指定 Django 设置模块，防止环境变量丢失导致加载失败。
env = DJANGO_SETTINGS_MODULE=maneu.settings

# 如果你的项目使用了虚拟环境（venv），务必取消注释并指向你的 Python 路径：
# home = /path/to/your/virtualenv
# pythonpath = /path/to/your/virtualenv/lib/python3.x/site-packages

# ==============================================
# 8. 性能触底优化（静默提升）
# ==============================================

# 在内存充足的情况下，开启此参数将 uWSGI 响应包体缓存在内存中。
# 可减少磁盘 I/O 开销，但会多占内存，建议服务器内存大于 4GB 时启用。
 reload-mercy = 10
 worker-reload-mercy = 10