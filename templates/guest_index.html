{% extends 'maneu/base.html' %}
{% load static %}

{% block css %}
    <style>
        /* ============================================================
           数据列表页样式（如门店/记录列表）
           依赖：全局 base.css 中的 CSS 变量
           注意：本文件只定义页面专属样式，颜色/圆角/边框等均复用全局变量
           ============================================================ */

        /* ---------- 1. 局部变量（仅覆盖/补充全局无定义的值） ---------- */
        :root {
            /* 卡片专用阴影（比全局更轻），用于 .filter-card 等 */
            --store-shadow: 0 4px 12px rgba(0, 0, 0, 0.04), 0 1px 3px rgba(0, 0, 0, 0.03);
        }

        /* ---------- 2. 页面头部 ---------- */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;            /* 小屏自动换行 */
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .page-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--brand-color);      /* 全局主色 */
            letter-spacing: -0.02em;       /* 收紧字距，更精致 */
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 0;                     /* 清除默认 margin */
        }

        /* 标题中的图标 */
        .page-title i {
            font-size: 2rem;               /* 图标略大于文字，增强视觉层次 */
            color: var(--brand-accent);    /* 强调色，与主色形成对比 */
        }

        /* ---------- 3. 筛选区域 ---------- */
        .filter-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            box-shadow: var(--store-shadow);    /* 使用本文件定义的轻阴影 */
            margin-bottom: 1.8rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-end;             /* 让按钮与输入框底部对齐 */
        }

        /* 单个筛选字段组 */
        .filter-group {
            flex: 1 1 220px;                   /* 最小宽度220px，自动伸缩 */
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .filter-group label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-secondary);      /* 使用基础次级文本色 */
        }

        /* 输入组微调阴影并统一圆角溢出隐藏 */
        .filter-group .input-group {
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.03);
            border-radius: var(--radius-md);
            overflow: hidden;                  /* 保证内部元素圆角裁剪 */
        }

        /* 去除 Bootstrap 默认圆角，使输入组更统一 */
        .filter-group .form-control,
        .filter-group .btn {
            border-radius: 0;
        }

        /* 筛选按钮内图标与文字间距 */
        .filter-group .btn {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        /* 新增记录按钮（胶囊形强调按钮） */
        .btn-add-record {
            background: var(--brand-accent);
            border: none;
            color: #000;
            font-weight: 600;
            padding: 0.55rem 1.4rem;
            border-radius: 2rem;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.08);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            text-decoration: none;             /* 若用于 <a> 标签，去除下划线 */
        }

        .btn-add-record:hover {
            background: #f5a623;               /* 具体色值，与品牌强调色略有差异，可考虑统一为变量 */
            color: #000;
            transform: translateY(-1px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.12);
        }

        /* ---------- 4. 列表头部（表头行） ---------- */
        .list-header {
            display: flex;
            padding: 0.8rem 1.2rem;
            background: var(--brand-color-pale);   /* 品牌浅色背景 */
            border-radius: var(--radius-md) var(--radius-md) 0 0;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--brand-color);
            letter-spacing: 0.03em;
            border: 1px solid var(--border-subtle);
            border-bottom: none;                   /* 与列表项边框无缝衔接 */
        }

        /* 各列宽度分配（flex: none 固定宽度） */
        .list-header .col-time    { flex: 0 0 160px; }
        .list-header .col-name    { flex: 0 0 100px; }
        .list-header .col-phone   { flex: 0 0 130px; }
        .list-header .col-remark  { flex: 1; }        /* 自适应剩余空间 */
        .list-header .col-actions { flex: 0 0 140px; text-align: right; }

        /* ---------- 5. 列表项 ---------- */
        .store-list-item {
            display: flex;
            align-items: center;
            padding: 1rem 1.2rem;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-top: none;                      /* 避免与表头边框重复 */
            transition: all 0.2s ease;
            gap: 0.2rem;
            flex-wrap: wrap;                       /* 允许内容少时换行，增强健壮性 */
        }

        /* 最后一个列表项补上底部边框和圆角 */
        .store-list-item:last-child {
            border-radius: 0 0 var(--radius-md) var(--radius-md);
            border-bottom: 1px solid var(--border-subtle);
        }

        /* 悬停高亮：左侧强调色条 + 浅灰背景 */
        .store-list-item:hover {
            background: #fafbfc;                       /* 未使用变量，可根据需要改为 var(--brand-color-pale) */
            box-shadow: inset 4px 0 0 var(--brand-accent);
        }

        /* 所有列内部使用 flex 便于垂直居中 */
        .store-list-item .col-time,
        .store-list-item .col-name,
        .store-list-item .col-phone,
        .store-list-item .col-remark,
        .store-list-item .col-actions {
            display: flex;
            align-items: center;
        }

        /* 各列具体样式 */
        .store-list-item .col-time {
            flex: 0 0 160px;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .store-list-item .col-name {
            flex: 0 0 100px;
            font-weight: 600;
        }

        .store-list-item .col-phone {
            flex: 0 0 130px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .store-list-item .col-remark {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;          /* 单行超出显示省略号 */
            padding-right: 0.5rem;
        }

        .store-list-item .col-actions {
            flex: 0 0 140px;
            justify-content: flex-end;
            gap: 0.5rem;
        }

        /* ---------- 6. 操作图标按钮 ---------- */
        .btn-action {
            width: 36px;
            height: 36px;
            border-radius: 50%;                   /* 圆形按钮 */
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-subtle);
            background: white;
            color: var(--text-secondary);
            transition: all 0.15s ease;
            padding: 0;
            cursor: pointer;
        }

        .btn-action:hover {
            background: var(--brand-color-pale);
            border-color: var(--brand-color);
            color: var(--brand-color);
        }

        /* 删除按钮的悬停状态（红色警示） */
        .btn-action.delete-btn:hover {
            background: #fef2f2;
            border-color: #dc2626;
            color: #dc2626;
        }

        /* ---------- 7. 响应式：移动端适配 ---------- */
        @media (max-width: 768px) {
            /* 隐藏表格头，改用卡片式展示 */
            .list-header {
                display: none;
            }

            .store-list-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
                position: relative;
                padding: 1.2rem;
            }

            /* 所有列变成块级，取消固定宽度 */
            .store-list-item .col-time,
            .store-list-item .col-name,
            .store-list-item .col-phone,
            .store-list-item .col-remark,
            .store-list-item .col-actions {
                flex: none;
                width: 100%;
            }

            /* 操作区用虚线上方分隔 */
            .store-list-item .col-actions {
                justify-content: flex-start;
                padding-top: 0.5rem;
                border-top: 1px dashed var(--border-subtle);
                margin-top: 0.3rem;
            }

            /* 通过 data-mobile-label 属性在卡片右上角显示标签（如"时间"） */
            .store-list-item::before {
                content: attr(data-mobile-label);
                position: absolute;
                top: 0.5rem;
                right: 1rem;
                font-size: 0.7rem;
                color: var(--text-secondary);
                font-weight: 600;
                letter-spacing: 0.03em;
            }

            /* 筛选卡片纵向排列 */
            .filter-card {
                flex-direction: column;
                align-items: stretch;
            }
        }

        /* ---------- 8. 空状态 & 加载动画 ---------- */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .empty-state i {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 0.8rem;
            color: #cbd5e1;               /* 浅灰图标，可考虑设为变量 */
        }

        .loading-spinner {
            display: flex;
            justify-content: center;
            padding: 2rem;
        }
    </style>
{% endblock %}

{% block content %}
    <div class="main-content-wrapper">
        <!-- 页面标题 -->
        <div class="page-header">
            <h1 class="page-title">
                <i class="bi bi-people-fill"></i> 客户管理
            </h1>
            <a href="{% url 'maneu_guest:insert' %}" class="btn-add-record">
                <i class="bi bi-plus-lg"></i> 新增订单
            </a>
        </div>

        <!-- 筛选区域 -->
        <div class="filter-card">
            <div class="filter-group">
                <label><i class="bi bi-search"></i> 客户信息</label>
                <div class="input-group input-group-sm">
                    <input class="form-control" id="value" placeholder="姓名或手机号码" type="text">
                    <button class="btn btn-primary" id="search_data" type="button">
                        <i class="bi bi-search"></i> 查询
                    </button>
                </div>
            </div>
            <div class="filter-group">
                <label><i class="bi bi-calendar-range"></i> 时间范围</label>
                <div class="input-group input-group-sm">
                    <span class="input-group-text">从</span>
                    <input autocomplete="off" class="form-control" id="timeS" type="datetime-local"
                           value="2024-01-01T00:00" max="{{ timeE }}" min="2010-01-01T00:00">
                    <span class="input-group-text">至</span>
                    <input autocomplete="off" class="form-control" id="timeE" type="datetime-local"
                           value="{{ timeE }}" max="{{ timeE }}" min="2010-01-01T00:00">
                    <button class="btn btn-primary" id="search_time" type="button">
                        <i class="bi bi-funnel"></i> 筛选
                    </button>
                </div>
            </div>
        </div>

        <!-- 列表头部（桌面） -->
        <div class="list-header d-none d-md-flex">
            <div class="col-time">录入时间</div>
            <div class="col-name">客户姓名</div>
            <div class="col-phone">联系电话</div>
            <div class="col-remark">订单备注</div>
            <div class="col-actions">操作</div>
        </div>

        <!-- 动态列表容器 -->
        <div id="body">
            <div class="loading-spinner">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">加载中...</span>
                </div>
            </div>
        </div>
    </div>
{% endblock %}

{% block javascript %}
    <script>
        // ---------- API 端点配置（统一管理，兼容多模块）----------
        const API = {
            order: {
                detail: "{% url 'maneu_order:detail' %}",
                delete: "{% url 'maneu_order:api_delete' %}"
            },
            store: {
                detail: "{% url 'maneu_store:detail' %}",
                delete: "{% url 'maneu_store:api_delete' %}"
            },
            report: {
                detail: "{% url 'maneu_report:detail' %}",
                delete: "{% url 'maneu_report:api_delete' %}"
            },
            guest: {
                detail: "{% url 'maneu_guest:detail' %}",
                delete: "{% url 'maneu_guest:api_delete' %}",
                searchData: "{% url 'maneu_guest:search_data' %}",
                searchTime: "{% url 'maneu_guest:search_time' %}"
            }
        };

        // ---------- DOM 缓存 ----------
        const $listContainer = $('#body');
        const $timeStart = $('#timeS');
        const $timeEnd = $('#timeE');
        const $keyword = $('#value');

        // ---------- 工具函数 ----------
        function showLoading() {
            $listContainer.html(`
        <div class="loading-spinner">
            <div class="spinner-border text-primary" role="status"></div>
        </div>`);
        }

        function showEmptyState() {
            $listContainer.html(`
        <div class="empty-state">
            <i class="bi bi-inbox"></i>
            <p>暂无订单记录</p>
            <small>尝试调整筛选条件或新增一条订单</small>
        </div>`);
        }

        function showErrorState() {
            $listContainer.html(`
        <div class="empty-state">
            <i class="bi bi-exclamation-triangle"></i>
            <p>加载失败，请稍后重试</p>
        </div>`);
        }

        /**
         * 生成单个列表项的 HTML
         * @param {Object} item 数据对象
         * @returns {string}
         */
        function createItemHTML(item) {
            const remarkText = item.remark || '-';
            const escapedRemark = remarkText.replace(/"/g, '&quot;');
            // 注意：data-status 值已在原 HTML 中正确设置（数字字符串）
            return `
        <div class="store-list-item" data-mobile-label="${item.time || ''}">
            <div class="col-time"><i class="bi bi-clock me-2 d-md-none"></i>${item.time || '-'}</div>
            <div class="col-name"><i class="bi bi-person me-2 d-md-none"></i>${item.name || '-'}</div>
            <div class="col-phone"><i class="bi bi-phone me-2 d-md-none"></i>${item.phone || '-'}</div>
            <div class="col-remark" title="${escapedRemark}">
                <i class="bi bi-chat-left-text me-2 d-md-none"></i>${remarkText}
            </div>
            <div class="col-actions">
                <button class="btn-action detail-btn" data-index_id="${item.id}" data-status="${item.status}" title="查看订单">
                    <i class="bi bi-eye"></i>
                </button>
                <button class="btn-action delete-btn" data-index_id="${item.id}" data-status="${item.status}" title="删除订单">
                    <i class="bi bi-trash3"></i>
                </button>
            </div>
        </div>`;
        }

        /**
         * 渲染列表
         * @param {Array} items 数据数组
         */
        function renderList(items) {
            $listContainer.empty();
            if (!Array.isArray(items) || items.length === 0) {
                showEmptyState();
                return;
            }
            items.forEach(item => {
                $listContainer.append(createItemHTML(item));
            });
        }

        /**
         * 查看详情（根据 status 跳转不同模块）
         * @param {HTMLElement} btn 触发按钮
         */
        function handleDetail(btn) {
            const indexId = btn.getAttribute('data-index_id');
            const status = btn.getAttribute('data-status');
            let detailUrl = null;

            if (status === '5') {
                detailUrl = API.guest.detail;
            } else if (status === '1') {
                detailUrl = API.store.detail;
            } else if (status === '2') {
                detailUrl = API.report.detail;
            } else if (status === '3') {
                detailUrl = API.order.detail;
            }

            if (detailUrl) {
                window.location.href = detailUrl + '?index_id=' + indexId;
            } else {
                console.warn('未知的状态值:', status);
            }
        }

        /**
         * 删除记录（根据 status 调用不同删除接口）
         * @param {HTMLElement} btn 触发按钮
         */
        function deleteRecord(btn) {
            if (!confirm("确定要删除这条订单吗？此操作不可恢复。")) return;

            const indexId = btn.getAttribute('data-index_id');
            const status = btn.getAttribute('data-status');
            let deleteUrl = null;

            if (status === '0') {
                deleteUrl = API.guest.delete;
            } else if (status === '1') {
                deleteUrl = API.store.delete;
            } else if (status === '2') {
                deleteUrl = API.report.delete;
            } else if (status === '3') {
                deleteUrl = API.order.delete;
            }

            if (!deleteUrl) {
                alert('无效的记录类型，无法删除');
                return;
            }

            $.ajax({
                url: deleteUrl,
                method: 'GET',
                data: { index_id: indexId },
                success(res) {
                    if (res.status === true) {
                        const $item = $(btn).closest('.store-list-item');
                        if ($item.length) {
                            $item.css({
                                transition: 'all 0.3s ease',
                                opacity: 0,
                                transform: 'translateX(20px)'
                            }).delay(300).queue(function () {
                                $(this).remove();
                                if (!$listContainer.find('.store-list-item').length) {
                                    showEmptyState();
                                }
                            });
                        }
                    } else {
                        alert(res.message || '删除失败，请稍后重试');
                    }
                },
                error() {
                    alert('网络错误，请稍后重试');
                }
            });
        }

        /**
         * 统一数据加载并渲染
         * @param {string} url 请求地址
         * @param {Object} params 参数
         */
        function fetchAndRender(url, params) {
            showLoading();
            $.get(url, params)
                .done(res => {
                    const data = Array.isArray(res) ? res : (res.content || []);
                    renderList(data);
                })
                .fail(() => showErrorState());
        }

        // ---------- 搜索触发函数 ----------
        function searchByTime() {
            fetchAndRender(API.guest.searchTime, {
                timeS: $timeStart.val(),
                timeE: $timeEnd.val()
            });
        }

        function searchByText() {
            const keyword = $keyword.val().trim();
            if (!keyword) {
                alert('请输入搜索关键词');
                return;
            }
            fetchAndRender(API.guest.searchData, { value: keyword });
        }

        // ---------- 初始化事件绑定 ----------
        $(function () {
            // 默认加载时间范围内的数据
            searchByTime();

            // 筛选按钮
            $('#search_time').on('click', searchByTime);
            $('#search_data').on('click', searchByText);

            // 回车搜索
            $keyword.on('keypress', function (e) {
                if (e.which === 13) searchByText();
            });

            // 事件委托：查看详情
            $listContainer.on('click', '.detail-btn', function () {
                handleDetail(this);
            });

            // 事件委托：删除记录
            $listContainer.on('click', '.delete-btn', function () {
                deleteRecord(this);
            });
        });
    </script>
{% endblock %}
