{% extends 'maneu/base.html' %}
{% load static %}


{% block css %}
    <link href="{% static 'css/maneu_index/index20260606.css' %}" rel="stylesheet">
{% endblock %}


{% block content %}
    <div class="main-content-wrapper">
        <!-- 页面标题 -->
        <div class="page-header">
            <h1 class="page-title">
                <i class="bi bi-bar-chart-line"></i> 验光数据可视化面板
            </h1>
        </div>

        <!-- 第一行：裸眼视力分布 + 眼轴长度分布 -->
        <div class="row g-4">
            <div class="col-md-6">
                <div class="chart-card">
                    <div class="chart-title"><i class="bi bi-eye"></i> 裸眼视力分布</div>
                    <div id="va-chart" class="chart-container"></div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="chart-card">
                    <div class="chart-title"><i class="bi bi-rulers"></i> 眼轴长度分布</div>
                    <div id="al-chart" class="chart-container"></div>
                </div>
            </div>
        </div>

        <!-- 第二行：球镜度数 + 柱镜度数 -->
        <div class="row g-4">
            <div class="col-md-6">
                <div class="chart-card">
                    <div class="chart-title"><i class="bi bi-circle"></i> 球镜度数分布 (SPH)</div>
                    <div id="sph-chart" class="chart-container"></div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="chart-card">
                    <div class="chart-title"><i class="bi bi-circle-half"></i> 柱镜度数分布 (CYL)</div>
                    <div id="cyl-chart" class="chart-container"></div>
                </div>
            </div>
        </div>

        <!-- 第三行：角膜曲率散点图（全宽） -->
        <div class="row g-4">
            <div class="col-12">
                <div class="chart-card">
                    <div class="chart-title"><i class="bi bi-graph-up"></i> 角膜曲率对比 (右眼 vs 左眼)</div>
                    <div id="ak-scatter-chart" class="chart-container-lg"></div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}


{% block javascript %}

    <script>
        // ========================================================================
        // 1. 工具函数 & 安全防护
        // ========================================================================

        /**
         * 安全获取数组（防止 undefined/null）
         * @param {*} data - 待检查数据
         * @returns {Array} 安全的数组
         */
        function safeArray(data) {
            return Array.isArray(data) ? data : [];
        }

        /**
         * 安全获取对象（防止 undefined/null）
         * @param {*} data - 待检查数据
         * @returns {Object} 安全的对象
         */
        function safeObject(data) {
            return (data && typeof data === 'object') ? data : {};
        }

        /**
         * 生成直方图数据（自动分箱，处理边界情况）
         * @param {number[]} data - 原始数值数组
         * @param {number} binCount - 箱子数量
         * @returns {Object} { categories: string[], values: number[] }
         */
        function histogramData(data, binCount = 10) {
            const cleanData = safeArray(data).filter(v => typeof v === 'number' && !isNaN(v));
            if (cleanData.length === 0) {
                return { categories: [], values: [] };
            }
            const min = Math.min(...cleanData);
            const max = Math.max(...cleanData);
            // 处理所有值相等的情况
            if (min === max) {
                return {
                    categories: [min.toFixed(1)],
                    values: [cleanData.length]
                };
            }
            const step = (max - min) / binCount;
            const bins = new Array(binCount).fill(0);
            const categories = [];
            for (let i = 0; i < binCount; i++) {
                const low = (min + i * step).toFixed(1);
                const high = (min + (i + 1) * step).toFixed(1);
                categories.push(`${low}~${high}`);
            }
            cleanData.forEach(v => {
                let idx = Math.floor((v - min) / step);
                if (idx >= binCount) idx = binCount - 1;
                bins[idx]++;
            });
            return { categories, values: bins };
        }

        /**
         * 初始化 ECharts 图表（透明背景，自动销毁旧实例）
         * @param {string} domId - 容器元素 ID
         * @returns {echarts.ECharts | null}
         */
        function initChart(domId) {
            const el = document.getElementById(domId);
            if (!el) return null;
            let existing = echarts.getInstanceByDom(el);
            if (existing) existing.dispose();
            return echarts.init(el, null, { backgroundColor: 'transparent' });
        }

        /**
         * 显示图表空状态
         * @param {echarts.ECharts} chartInstance - 图表实例
         * @param {string} message - 提示信息
         */
        function showEmptyChart(chartInstance, message = '暂无数据') {
            if (!chartInstance) return;
            chartInstance.setOption({
                title: {
                    show: true,
                    text: message,
                    left: 'center',
                    top: 'center',
                    textStyle: { color: '#94a3b8', fontSize: 14, fontWeight: 'normal' }
                },
                xAxis: { show: false },
                yAxis: { show: false },
                series: []
            });
        }

        // ========================================================================
        // 2. 全局 AJAX 默认配置（自动携带 JWT Token 和 CSRF）
        // ========================================================================

        }

        // ========================================================================
        // 3. API 端点（由 Django 模板反向解析）
        // ========================================================================

        const STATISTICS_API = "{% url 'maneu_index:api_statistics' %}";

        // ========================================================================
        // 4. DOM 缓存 & 状态容器
        // ========================================================================

        // 图表容器 ID 列表
        const CHART_IDS = ['va-chart', 'al-chart', 'sph-chart', 'cyl-chart', 'ak-scatter-chart'];

        // 用于显示全局加载/错误状态（可在页面中预留一个统一提示区域，这里直接在各图表中显示）
        // 如果需要统一提示，可以添加一个容器，但为了简便，我们使用图表自身的空状态

        // 请求取消控制器
        let currentRequest = null;

        // ========================================================================
        // 5. UI 状态函数（针对图表容器）
        // ========================================================================

        /** 显示所有图表为“加载中”状态 */
        function showAllChartsLoading() {
            CHART_IDS.forEach(id => {
                const chart = initChart(id);
                if (chart) {
                    chart.setOption({
                        title: {
                            show: true,
                            text: '加载中...',
                            left: 'center',
                            top: 'center',
                            textStyle: { color: '#94a3b8', fontSize: 14 }
                        },
                        series: []
                    });
                }
            });
        }

        /** 显示所有图表为错误状态 */
        function showAllChartsError(message = '数据加载失败，请稍后重试') {
            CHART_IDS.forEach(id => {
                const chart = initChart(id);
                if (chart) {
                    showEmptyChart(chart, message);
                }
            });
        }

        /** 显示所有图表为空状态（无数据） */
        function showAllChartsEmpty() {
            CHART_IDS.forEach(id => {
                const chart = initChart(id);
                if (chart) {
                    showEmptyChart(chart, '暂无统计数据');
                }
            });
        }

        // ========================================================================
        // 6. 图表绘制函数（接收数据参数）
        // ========================================================================

        /**
         * 绘制裸眼视力分布柱状图
         */
        function drawVaCompareChart(odVaCat, osVaCat) {
            const chart = initChart('va-chart');
            if (!chart) return;

            const allKeys = new Set([...Object.keys(odVaCat), ...Object.keys(osVaCat)]);
            if (allKeys.size === 0) {
                showEmptyChart(chart, '无裸眼视力数据');
                return;
            }
            const sortedKeys = Array.from(allKeys).sort((a, b) => parseFloat(a) - parseFloat(b));
            const odValues = sortedKeys.map(k => odVaCat[k] || 0);
            const osValues = sortedKeys.map(k => osVaCat[k] || 0);

            chart.setOption({
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                legend: {
                    data: ['右眼', '左眼'],
                    top: 'bottom',
                    textStyle: { color: '#64748b' }
                },
                grid: { containLabel: true, left: '8%', right: '5%' },
                xAxis: {
                    type: 'category',
                    data: sortedKeys,
                    axisLabel: { color: '#64748b', rotate: sortedKeys.length > 8 ? 45 : 0, interval: 0 }
                },
                yAxis: {
                    type: 'value',
                    name: '人数',
                    nameTextStyle: { color: '#64748b' }
                },
                series: [
                    { name: '右眼', type: 'bar', data: odValues, itemStyle: { color: '#5470C6' }, barGap: '20%' },
                    { name: '左眼', type: 'bar', data: osValues, itemStyle: { color: '#91cc75' } }
                ]
            });
        }

        /**
         * 绘制眼轴长度分布直方图
         */
        function drawAlCompareHistogram(odAl, osAl) {
            const chart = initChart('al-chart');
            if (!chart) return;

            const odHist = histogramData(odAl, 10);
            const osHist = histogramData(osAl, 10);
            if (odHist.categories.length === 0 && osHist.categories.length === 0) {
                showEmptyChart(chart, '无眼轴长度数据');
                return;
            }
            const categories = odHist.categories.length ? odHist.categories : osHist.categories;
            const odValues = odHist.categories.length ? odHist.values : new Array(categories.length).fill(0);
            const osValues = osHist.categories.length ? osHist.values : new Array(categories.length).fill(0);

            chart.setOption({
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                legend: {
                    data: ['右眼', '左眼'],
                    top: 'bottom',
                    textStyle: { color: '#64748b' }
                },
                grid: { containLabel: true },
                xAxis: {
                    type: 'category',
                    data: categories,
                    axisLabel: { color: '#64748b', rotate: categories.length > 8 ? 45 : 0, interval: 0 }
                },
                yAxis: {
                    type: 'value',
                    name: '人数',
                    nameTextStyle: { color: '#64748b' }
                },
                series: [
                    { name: '右眼', type: 'bar', data: odValues, itemStyle: { color: '#5470C6' } },
                    { name: '左眼', type: 'bar', data: osValues, itemStyle: { color: '#91cc75' } }
                ]
            });
        }

        /**
         * 绘制球镜度数分布直方图
         */
        function drawSphChart(odSph, osSph) {
            const chart = initChart('sph-chart');
            if (!chart) return;

            const odHist = histogramData(odSph, 12);
            const osHist = histogramData(osSph, 12);
            if (odHist.categories.length === 0 && osHist.categories.length === 0) {
                showEmptyChart(chart, '无球镜度数数据');
                return;
            }
            const categories = odHist.categories.length ? odHist.categories : osHist.categories;
            const odValues = odHist.categories.length ? odHist.values : new Array(categories.length).fill(0);
            const osValues = osHist.categories.length ? osHist.values : new Array(categories.length).fill(0);

            chart.setOption({
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                legend: {
                    data: ['右眼', '左眼'],
                    textStyle: { color: '#64748b' }
                },
                grid: { containLabel: true },
                xAxis: {
                    type: 'category',
                    data: categories,
                    axisLabel: { color: '#64748b', rotate: categories.length > 8 ? 45 : 0, interval: 0 }
                },
                yAxis: {
                    type: 'value',
                    name: '人数',
                    nameTextStyle: { color: '#64748b' }
                },
                series: [
                    { name: '右眼', type: 'bar', data: odValues, itemStyle: { color: '#5470C6' } },
                    { name: '左眼', type: 'bar', data: osValues, itemStyle: { color: '#91cc75' } }
                ]
            });
        }

        /**
         * 绘制柱镜度数分布直方图
         */
        function drawCylChart(odCyl, osCyl) {
            const chart = initChart('cyl-chart');
            if (!chart) return;

            const odHist = histogramData(odCyl, 10);
            const osHist = histogramData(osCyl, 10);
            if (odHist.categories.length === 0 && osHist.categories.length === 0) {
                showEmptyChart(chart, '无柱镜度数数据');
                return;
            }
            const categories = odHist.categories.length ? odHist.categories : osHist.categories;
            const odValues = odHist.categories.length ? odHist.values : new Array(categories.length).fill(0);
            const osValues = osHist.categories.length ? osHist.values : new Array(categories.length).fill(0);

            chart.setOption({
                tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                legend: {
                    data: ['右眼', '左眼'],
                    textStyle: { color: '#64748b' }
                },
                grid: { containLabel: true },
                xAxis: {
                    type: 'category',
                    data: categories,
                    axisLabel: { color: '#64748b', rotate: categories.length > 8 ? 45 : 0, interval: 0 }
                },
                yAxis: {
                    type: 'value',
                    name: '人数',
                    nameTextStyle: { color: '#64748b' }
                },
                series: [
                    { name: '右眼', type: 'bar', data: odValues, itemStyle: { color: '#5470C6' } },
                    { name: '左眼', type: 'bar', data: osValues, itemStyle: { color: '#91cc75' } }
                ]
            });
        }

        /**
         * 绘制角膜曲率散点图
         */
        function drawAkScatterChart(odAk, osAk) {
            const chart = initChart('ak-scatter-chart');
            if (!chart) return;

            const pairs = [];
            const len = Math.min(odAk.length, osAk.length);
            for (let i = 0; i < len; i++) {
                if (typeof odAk[i] === 'number' && typeof osAk[i] === 'number' && !isNaN(odAk[i]) && !isNaN(osAk[i])) {
                    pairs.push([odAk[i], osAk[i]]);
                }
            }
            if (pairs.length === 0) {
                showEmptyChart(chart, '无角膜曲率数据');
                return;
            }

            chart.setOption({
                tooltip: {
                    trigger: 'item',
                    formatter: params => `右眼: ${params.value[0]} D<br/>左眼: ${params.value[1]} D`
                },
                xAxis: {
                    name: '右眼角膜曲率 (D)',
                    nameTextStyle: { color: '#64748b' },
                    axisLabel: { color: '#64748b' }
                },
                yAxis: {
                    name: '左眼角膜曲率 (D)',
                    nameTextStyle: { color: '#64748b' },
                    axisLabel: { color: '#64748b' }
                },
                series: [{
                    type: 'scatter',
                    data: pairs,
                    symbolSize: 8,
                    itemStyle: { color: '#5470C6', opacity: 0.7 }
                }]
            });
        }

        // ========================================================================
        // 7. 数据加载核心函数
        // ========================================================================

        /**
         * 从后端获取统计数据并绘制图表
         */
        function fetchStatistics() {
            // 取消前一个未完成的请求
            if (currentRequest && currentRequest.readyState !== 4) {
                currentRequest.abort();
            }

            // 显示加载状态
            showAllChartsLoading();

            currentRequest = $.ajax({
                url: STATISTICS_API,
                method: 'POST',
                success: function(res) {
                    if (res.status === true && res.data) {
                        const data = res.data;
                        // 安全解析各个字段（后端返回的 JSON 字符串，需 parse）
                        let odVaCat = {};
                        let osVaCat = {};
                        let odSph = [];
                        let osSph = [];
                        let odCyl = [];
                        let osCyl = [];
                        let odAl = [];
                        let osAl = [];
                        let odAk = [];
                        let osAk = [];

                        try {
                            if (data.od_va_cat) odVaCat = JSON.parse(data.od_va_cat);
                            if (data.os_va_cat) osVaCat = JSON.parse(data.os_va_cat);
                            if (data.od_sph) odSph = JSON.parse(data.od_sph);
                            if (data.os_sph) osSph = JSON.parse(data.os_sph);
                            if (data.od_cyl) odCyl = JSON.parse(data.od_cyl);
                            if (data.os_cyl) osCyl = JSON.parse(data.os_cyl);
                            if (data.od_al) odAl = JSON.parse(data.od_al);
                            if (data.os_al) osAl = JSON.parse(data.os_al);
                            if (data.od_ak) odAk = JSON.parse(data.od_ak);
                            if (data.os_ak) osAk = JSON.parse(data.os_ak);
                        } catch (e) {
                            console.error('解析统计数据失败:', e);
                            showAllChartsError('数据格式错误');
                            return;
                        }

                        // 确保是安全的数组/对象
                        odVaCat = safeObject(odVaCat);
                        osVaCat = safeObject(osVaCat);
                        odSph = safeArray(odSph);
                        osSph = safeArray(osSph);
                        odCyl = safeArray(odCyl);
                        osCyl = safeArray(osCyl);
                        odAl = safeArray(odAl);
                        osAl = safeArray(osAl);
                        odAk = safeArray(odAk);
                        osAk = safeArray(osAk);

                        // 绘制所有图表
                        drawVaCompareChart(odVaCat, osVaCat);
                        drawAlCompareHistogram(odAl, osAl);
                        drawSphChart(odSph, osSph);
                        drawCylChart(odCyl, osCyl);
                        drawAkScatterChart(odAk, osAk);
                    } else {
                        // 接口返回失败状态
                        const errMsg = res.message || '数据加载失败';
                        showAllChartsError(errMsg);
                    }
                },
                error: function(xhr, status) {
                    if (status === 'abort') return;
                    console.error('统计接口请求失败:', xhr.status, xhr.statusText);
                    showAllChartsError('网络错误，请刷新重试');
                }
            });
        }

        // ========================================================================
        // 8. 页面初始化 & 事件绑定
        // ========================================================================

        $(function() {
            // 确保 ECharts 已加载
            if (typeof echarts === 'undefined') {
                console.error('ECharts 未加载，请检查网络或 CDN 地址');
                return;
            }

            // 加载统计数据
            fetchStatistics();

            // 响应式缩放（防抖）
            let resizeTimer;
            window.addEventListener('resize', function() {
                if (resizeTimer) clearTimeout(resizeTimer);
                resizeTimer = setTimeout(function() {
                    CHART_IDS.forEach(id => {
                        const dom = document.getElementById(id);
                        if (dom) {
                            const instance = echarts.getInstanceByDom(dom);
                            if (instance) instance.resize();
                        }
                    });
                }, 150);
            });
        });
    </script>
{% endblock %}
