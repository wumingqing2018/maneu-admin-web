{% extends 'maneu/base.html' %}
{% load static %}

{% block css %}
    <link href="{% static 'css/maneu_order/index20260606.css' %}" rel="stylesheet">
{% endblock %}

{% block content %}
    <div class="main-content-wrapper">
        <!-- 页面头部：标题 + 新增按钮 -->
        <div class="page-header">
            <h1 class="page-title">
                <i class="bi bi-receipt"></i> 订单管理
            </h1>
            <a href="{% url 'maneu_order:insert' %}" class="btn-add-record">
                <i class="bi bi-plus-lg"></i> 新增订单
            </a>
        </div>

        <!-- 筛选栏：支持客户信息搜索 + 时间范围筛选 -->
        <div class="filter-card">
            <div class="filter-group">
                <label><i class="bi bi-search"></i> 客户信息</label>
                <div class="input-group input-group-sm">
                    <input class="form-control" id="value" placeholder="姓名或手机号码" type="text">
                    <button class="btn btn-primary" id="search_data" type="button">
                        <i class="bi bi-search"></i> 查询
                    </button>
                </div>
                <div class="invalid-feedback" style="display: none;">请输入搜索关键词</div>
            </div>
            <div class="filter-group">
                <label><i class="bi bi-calendar-range"></i> 时间范围</label>
                <div class="input-group input-group-sm">
                    <span class="input-group-text">从</span>
                    <input autocomplete="off" class="form-control" id="timeS" type="datetime-local"
                           value="{{ default_time_start }}" max="{{ timeE }}" min="2010-01-01T00:00">
                    <span class="input-group-text">至</span>
                    <input autocomplete="off" class="form-control" id="timeE" type="datetime-local"
                           value="{{ timeE }}" max="{{ timeE }}" min="2010-01-01T00:00">
                    <button class="btn btn-primary" id="search_time" type="button">
                        <i class="bi bi-funnel"></i> 筛选
                    </button>
                </div>
            </div>
        </div>

        <!-- 列表表头（桌面设备显示） -->
        <div class="list-header d-none d-md-flex">
            <div class="col-time">录入时间</div>
            <div class="col-name">客户姓名</div>
            <div class="col-phone">联系电话</div>
            <div class="col-remark">订单备注</div>
            <div class="col-actions">操作</div>
        </div>

        <!-- 动态列表容器，JS 会异步填充内容 -->
        <div id="body">
            <div class="loading-spinner">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">加载中...</span>
                </div>
            </div>
        </div>
    </div>
{% endblock %}

{% block javascript %}
<script>
    // ========================================================================
    // 1. 工具函数 & 安全防护
    // ========================================================================

    /**
     * HTML 转义（XSS 防护）
     */
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    /**
     * 从 Cookie 获取 Django CSRF Token
     */
    function getCSRFToken() {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, 10) === 'csrftoken=') {
                    cookieValue = decodeURIComponent(cookie.substring(10));
                    break;
                }
            }
        }
        return cookieValue;
    }

    /**
     * 格式化时间（仅保留日期，用于展示）
     */
    function formatTimeShort(timeStr) {
        if (!timeStr) return '';
        const parts = timeStr.split(' ');
        return parts.length >= 1 ? parts[0] : timeStr.substring(0, 10);
    }

    // ========================================================================
    // 2. 全局 AJAX 默认配置（自动携带 JWT Token 和 CSRF）
    // ========================================================================



    // ========================================================================
    // 3. API 端点（由 Django 模板反向解析）
    // ========================================================================

    const ORDER = {
        web_detail: "{% url 'maneu_order:detail' %}",
        api_delete: "{% url 'maneu_order:api_delete' %}",
        api_searchText: "{% url 'maneu_order:api_search_data' %}",
        api_searchTime: "{% url 'maneu_order:api_search_time' %}"
    };

    // ========================================================================
    // 4. DOM 缓存 & 请求控制器
    // ========================================================================

    const $listContainer = $('#body');
    const $timeStart = $('#timeS');
    const $timeEnd = $('#timeE');
    const $keyword = $('#value');
    const $searchDataBtn = $('#search_data');
    const $searchTimeBtn = $('#search_time');

    let currentRequest = null;  // 用于取消前一个未完成的请求

    // ========================================================================
    // 5. UI 状态函数
    // ========================================================================

    function showLoading() {
        $listContainer.html(`
            <div class="loading-spinner">
                <div class="spinner-border text-primary" role="status"></div>
            </div>
        `);
    }

    function showEmptyState() {
        $listContainer.html(`
            <div class="empty-state">
                <i class="bi bi-inbox"></i>
                <p>暂无订单记录</p>
                <small>尝试调整筛选条件或新增一条订单</small>
            </div>
        `);
    }

    function showErrorState() {
        $listContainer.html(`
            <div class="empty-state">
                <i class="bi bi-exclamation-triangle"></i>
                <p>加载失败，请稍后重试</p>
            </div>
        `);
    }

    function clearKeywordInvalid() {
        $keyword.removeClass('is-invalid');
        $keyword.closest('.filter-group').find('.invalid-feedback').hide();
    }

    function showKeywordInvalid() {
        $keyword.addClass('is-invalid');
        $keyword.closest('.filter-group').find('.invalid-feedback').show();
    }

    // ========================================================================
    // 6. 列表渲染（XSS 防护）
    // ========================================================================

    function createItemHTML(item) {
        const timeRaw = item.time || '';
        const timeDisplay = escapeHtml(timeRaw);
        const name = escapeHtml(item.name) || '-';
        const phone = escapeHtml(item.phone) || '-';
        const remarkRaw = item.remark || '-';
        const remark = escapeHtml(remarkRaw);
        const escapedRemarkAttr = remarkRaw.replace(/"/g, '&quot;');
        const id = escapeHtml(item.id);

        return `
            <div class="store-list-item">
                <div class="col-time">
                    <i class="bi bi-clock me-2 d-md-none"></i>
                    ${timeDisplay || '-'}
                </div>
                <div class="col-name">
                    <i class="bi bi-person me-2 d-md-none"></i>
                    ${name}
                </div>
                <div class="col-phone">
                    <i class="bi bi-phone me-2 d-md-none"></i>
                    ${phone}
                </div>
                <div class="col-remark" title="${escapedRemarkAttr}">
                    <i class="bi bi-chat-left-text me-2 d-md-none"></i>
                    ${remark}
                </div>
                <div class="col-actions">
                    <button class="btn-action detail-btn" data-index_id="${id}" title="查看订单">
                        <i class="bi bi-eye"></i>
                    </button>
                    <button class="btn-action delete-btn" data-index_id="${id}" title="删除订单">
                        <i class="bi bi-trash3"></i>
                    </button>
                </div>
            </div>
        `;
    }

    function renderList(items) {
        $listContainer.empty();
        if (!Array.isArray(items) || items.length === 0) {
            showEmptyState();
            return;
        }
        const fragment = $(document.createDocumentFragment());
        items.forEach(item => {
            fragment.append(createItemHTML(item));
        });
        $listContainer.append(fragment);
    }

    // ========================================================================
    // 7. 业务操作：详情跳转 & 删除记录
    // ========================================================================

    function handleDetail(btn) {
        const indexId = btn.getAttribute('data-index_id');
        window.location.href = ORDER.web_detail + '?index_id=' + indexId;
    }

    function deleteRecord(btn) {
        if (!confirm("确定要删除这条订单吗？此操作不可恢复。")) return;

        const indexId = btn.getAttribute('data-index_id');
        $.ajax({
            url: ORDER.api_delete,
            method: 'POST',          // 保持后端接口不变
            data: { index_id: indexId },
            success: function(res) {
                if (res.status === true) {
                    const $item = $(btn).closest('.store-list-item');
                    if ($item.length) {
                        $item.css({
                            transition: 'all 0.3s ease',
                            opacity: 0,
                            transform: 'translateX(20px)'
                        });
                        setTimeout(() => {
                            $item.remove();
                            if (!$listContainer.find('.store-list-item').length) {
                                showEmptyState();
                            }
                        }, 300);
                    }
                } else {
                    alert(res.message || '删除失败，请稍后重试');
                }
            },
            error: function(xhr) {
                if (xhr.status === 403) {
                    alert('CSRF 验证失败，请刷新页面后重试');
                } else {
                    alert('网络错误，请稍后重试');
                }
            }
        });
    }

    // ========================================================================
    // 8. 数据加载
    // ========================================================================

    function fetchAndRender(url, params) {
        // 取消前一个未完成的请求（避免数据错乱）
        if (currentRequest && currentRequest.readyState !== 4) {
            currentRequest.abort();
        }

        showLoading();

        currentRequest = $.ajax({
            url: url,
            method: 'POST',
            data: params,
            // 无需手动设置 headers，全局 ajaxSetup 已自动添加
            success: function(res) {
                // 兼容两种返回格式：直接数组 或 { content: [...] }
                const data = Array.isArray(res) ? res : (res.content || []);
                renderList(data);
            },
            error: function(xhr, status) {
                if (status === 'abort') return;
                showErrorState();
            }
        });
    }

    // ========================================================================
    // 9. 搜索函数
    // ========================================================================

    function searchByTime() {
        clearKeywordInvalid();
        fetchAndRender(ORDER.api_searchTime, {
            timeS: $timeStart.val(),
            timeE: $timeEnd.val()
        });
    }

    function searchByText() {
        const keyword = $keyword.val().trim();
        if (!keyword) {
            showKeywordInvalid();
            return;
        }
        clearKeywordInvalid();
        fetchAndRender(ORDER.api_searchText, { value: keyword });
    }

    // ========================================================================
    // 10. 页面初始化 & 事件绑定
    // ========================================================================

    $(function() {
        // 设置默认时间范围（30天前 ~ 当前）
        if (!$timeStart.val()) {
            const thirtyDaysAgo = new Date();
            thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
            $timeStart.val(thirtyDaysAgo.toISOString().slice(0, 16));
        }
        if (!$timeEnd.val()) {
            const now = new Date();
            $timeEnd.val(now.toISOString().slice(0, 16));
        }

        // 默认加载时间范围内的数据
        searchByTime();

        // 按钮事件绑定
        $searchTimeBtn.on('click', searchByTime);
        $searchDataBtn.on('click', searchByText);

        // 回车键触发关键词搜索
        $keyword.on('keypress', function(e) {
            if (e.which === 13) {
                e.preventDefault();
                searchByText();
            }
        });

        // 事件委托：查看详情
        $listContainer.on('click', '.detail-btn', function() {
            handleDetail(this);
        });

        // 事件委托：删除记录
        $listContainer.on('click', '.delete-btn', function() {
            deleteRecord(this);
        });
    });
</script>
{% endblock %}
