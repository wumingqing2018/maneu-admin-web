{% extends 'maneu/base.html' %}
{% load static %}


{% block css %}
    <style>
        /* 与 store 页面完全一致的定制管理样式（订单管理复用） */
        :root {
            --store-accent: hsl(38, 92%, 55%);
            --store-surface: #ffffff;
            --store-border: #e8ecf1;
            --store-text: #1e293b;
            --store-muted: #64748b;
            --store-radius: 12px;
            --store-shadow: 0 4px 12px rgba(0, 0, 0, 0.04), 0 1px 3px rgba(0, 0, 0, 0.03);
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .page-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--brand-color);
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 0;
        }

        .page-title i {
            font-size: 2rem;
            color: var(--brand-accent);
        }

        /* 筛选卡片 */
        .filter-card {
            background: var(--store-surface);
            border: 1px solid var(--store-border);
            border-radius: var(--store-radius);
            padding: 1.5rem;
            box-shadow: var(--store-shadow);
            margin-bottom: 1.8rem;
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: flex-end;
        }

        .filter-group {
            flex: 1 1 220px;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .filter-group label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--store-muted);
        }

        .filter-group .input-group {
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.03);
            border-radius: var(--store-radius);
            overflow: hidden;
        }

        .filter-group .form-control,
        .filter-group .btn {
            border-radius: 0;
        }

        .filter-group .btn {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .btn-add-record {
            background: var(--brand-accent);
            border: none;
            color: #000;
            font-weight: 600;
            padding: 0.55rem 1.4rem;
            border-radius: 2rem;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.08);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            text-decoration: none;
        }

        .btn-add-record:hover {
            background: #f5a623;
            color: #000;
            transform: translateY(-1px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.12);
        }

        /* 列表头部 */
        .list-header {
            display: flex;
            padding: 0.8rem 1.2rem;
            background: var(--brand-color-pale);
            border-radius: var(--store-radius) var(--store-radius) 0 0;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--brand-color);
            letter-spacing: 0.03em;
            border: 1px solid var(--store-border);
            border-bottom: none;
        }

        .list-header .col-time {
            flex: 0 0 160px;
        }

        .list-header .col-name {
            flex: 0 0 100px;
        }

        .list-header .col-phone {
            flex: 0 0 130px;
        }

        .list-header .col-remark {
            flex: 1;
        }

        .list-header .col-actions {
            flex: 0 0 140px;
            text-align: right;
        }

        /* 列表卡片 */
        .store-list-item {
            display: flex;
            align-items: center;
            padding: 1rem 1.2rem;
            background: var(--store-surface);
            border: 1px solid var(--store-border);
            border-top: none;
            transition: all 0.2s ease;
            gap: 0.2rem;
            flex-wrap: wrap;
        }

        .store-list-item:last-child {
            border-radius: 0 0 var(--store-radius) var(--store-radius);
            border-bottom: 1px solid var(--store-border);
        }

        .store-list-item:hover {
            background: #fafbfc;
            box-shadow: inset 4px 0 0 var(--brand-accent);
        }

        .store-list-item .col-time,
        .store-list-item .col-name,
        .store-list-item .col-phone,
        .store-list-item .col-remark,
        .store-list-item .col-actions {
            display: flex;
            align-items: center;
        }

        .store-list-item .col-time {
            flex: 0 0 160px;
            font-size: 0.9rem;
            color: var(--store-muted);
        }

        .store-list-item .col-name {
            flex: 0 0 100px;
            font-weight: 600;
        }

        .store-list-item .col-phone {
            flex: 0 0 130px;
            color: var(--store-muted);
            font-size: 0.9rem;
        }

        .store-list-item .col-remark {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 0.5rem;
        }

        .store-list-item .col-actions {
            flex: 0 0 140px;
            justify-content: flex-end;
            gap: 0.5rem;
        }

        .btn-action {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--store-border);
            background: white;
            color: var(--store-muted);
            transition: all 0.15s ease;
            padding: 0;
            cursor: pointer;
        }

        .btn-action:hover {
            background: var(--brand-color-pale);
            border-color: var(--brand-color);
            color: var(--brand-color);
        }

        .btn-action.delete-btn:hover {
            background: #fef2f2;
            border-color: #dc2626;
            color: #dc2626;
        }

        /* 移动端 */
        @media (max-width: 768px) {
            .list-header {
                display: none;
            }

            .store-list-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.5rem;
                position: relative;
                padding: 1.2rem;
            }

            .store-list-item .col-time,
            .store-list-item .col-name,
            .store-list-item .col-phone,
            .store-list-item .col-remark,
            .store-list-item .col-actions {
                flex: none;
                width: 100%;
            }

            .store-list-item .col-actions {
                justify-content: flex-start;
                padding-top: 0.5rem;
                border-top: 1px dashed var(--store-border);
                margin-top: 0.3rem;
            }

            .store-list-item::before {
                content: attr(data-mobile-label);
                position: absolute;
                top: 0.5rem;
                right: 1rem;
                font-size: 0.7rem;
                color: var(--store-muted);
                font-weight: 600;
                letter-spacing: 0.03em;
            }

            .filter-card {
                flex-direction: column;
                align-items: stretch;
            }
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            background: var(--store-surface);
            border: 1px solid var(--store-border);
            border-radius: var(--store-radius);
            color: var(--store-muted);
            font-size: 1rem;
        }

        .empty-state i {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 0.8rem;
            color: #cbd5e1;
        }

        .loading-spinner {
            display: flex;
            justify-content: center;
            padding: 2rem;
        }
    </style>
{% endblock %}


{% block content %}
    <div class="main-content-wrapper">
        <!-- 页面标题 -->
        <div class="page-header">
            <h1 class="page-title">
                <i class="bi bi-receipt"></i> 订单管理
            </h1>
            <a href="{% url 'maneu_order:insert' %}" class="btn-add-record">
                <i class="bi bi-plus-lg"></i> 新增订单
            </a>
        </div>

        <!-- 筛选区域 -->
        <div class="filter-card">
            <div class="filter-group">
                <label><i class="bi bi-search"></i> 客户信息</label>
                <div class="input-group input-group-sm">
                    <input class="form-control" id="value" placeholder="姓名或手机号码" type="text">
                    <button class="btn btn-primary" id="search_data" type="button">
                        <i class="bi bi-search"></i> 查询
                    </button>
                </div>
            </div>
            <div class="filter-group">
                <label><i class="bi bi-calendar-range"></i> 时间范围</label>
                <div class="input-group input-group-sm">
                    <span class="input-group-text">从</span>
                    <input autocomplete="off" class="form-control" id="timeS" type="datetime-local"
                           value="2024-01-01T00:00" max="{{ timeE }}" min="2010-01-01T00:00">
                    <span class="input-group-text">至</span>
                    <input autocomplete="off" class="form-control" id="timeE" type="datetime-local"
                           value="{{ timeE }}" max="{{ timeE }}" min="2010-01-01T00:00">
                    <button class="btn btn-primary" id="search_time" type="button">
                        <i class="bi bi-funnel"></i> 筛选
                    </button>
                </div>
            </div>
        </div>

        <!-- 列表头部（桌面） -->
        <div class="list-header d-none d-md-flex">
            <div class="col-time">录入时间</div>
            <div class="col-name">客户姓名</div>
            <div class="col-phone">联系电话</div>
            <div class="col-remark">订单备注</div>
            <div class="col-actions">操作</div>
        </div>

        <!-- 动态列表容器 -->
        <div id="body">
            <div class="loading-spinner">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">加载中...</span>
                </div>
            </div>
        </div>
    </div>
{% endblock %}


{% block javascript %}
    <script>
        // API 端点
        const api_detail = "{% url 'maneu_order:detail' %}";
        const api_delete = "{% url 'maneu_order:api_delete' %}";
        const search_data_url = "{% url 'maneu_order:search_data' %}";
        const search_time_url = "{% url 'maneu_order:search_time' %}";

        // 删除记录
        function deleteRecord(btn) {
            if (!confirm("确定要删除这条订单吗？此操作不可恢复。")) return;
            const indexId = btn.dataset.index_id;
            $.ajax({
                url: api_delete,
                type: 'GET',
                data: {index_id: indexId},
                success: function (res) {
                    if (res.status === true) {
                        const item = btn.closest('.store-list-item');
                        if (item) {
                            item.style.transition = 'all 0.3s ease';
                            item.style.opacity = '0';
                            item.style.transform = 'translateX(20px)';
                            setTimeout(() => item.remove(), 300);
                        }
                        if ($('#body .store-list-item').length === 0) {
                            showEmptyState();
                        }
                    } else {
                        alert(res.message || '删除失败，请稍后重试');
                    }
                },
                error: function () {
                    alert('网络错误，请稍后重试');
                }
            });
        }

        // 渲染列表
        function renderList(dataArray) {
            const container = $('#body');
            container.empty();
            if (!dataArray || dataArray.length === 0) {
                showEmptyState();
                return;
            }
            dataArray.forEach(item => {
                const remarkText = item.remark || '-';
                const rowHtml = `
            <div class="store-list-item" data-mobile-label="${item.time || ''}">
                <div class="col-time"><i class="bi bi-clock me-2 d-md-none"></i>${item.time || '-'}</div>
                <div class="col-name"><i class="bi bi-person me-2 d-md-none"></i>${item.name || '-'}</div>
                <div class="col-phone"><i class="bi bi-phone me-2 d-md-none"></i>${item.phone || '-'}</div>
                <div class="col-remark" title="${remarkText.replace(/"/g, '&quot;')}">
                    <i class="bi bi-chat-left-text me-2 d-md-none"></i>${remarkText}
                </div>
                <div class="col-actions">
                    <a href="${api_detail}?index_id=${item.id}" class="btn-action" title="查看详情">
                        <i class="bi bi-eye"></i>
                    </a>
                    <button class="btn-action delete-btn" data-index_id="${item.id}" onclick="deleteRecord(this)" title="删除订单">
                        <i class="bi bi-trash3"></i>
                    </button>
                </div>
            </div>`;
                container.append(rowHtml);
            });
        }

        function showEmptyState() {
            $('#body').html(`
        <div class="empty-state">
            <i class="bi bi-inbox"></i>
            <p>暂无订单记录</p>
            <small>尝试调整筛选条件或新增一条订单</small>
        </div>`);
        }

        function fetchAndRender(url, params) {
            const body = $('#body');
            body.html(`<div class="loading-spinner"><div class="spinner-border text-primary" role="status"></div></div>`);
            $.ajax({
                url: url,
                method: 'GET',
                data: params,
                success: function (res) {
                    renderList(res.content || []);
                },
                error: function () {
                    body.html(`<div class="empty-state"><i class="bi bi-exclamation-triangle"></i><p>加载失败，请稍后重试</p></div>`);
                }
            });
        }

        $(document).ready(function () {
            // 初始加载：默认时间范围
            const timeS = $("#timeS").val();
            const timeE = $("#timeE").val();
            fetchAndRender(search_time_url, {timeS: timeS, timeE: timeE});

            // 时间筛选
            $('#search_time').click(function () {
                fetchAndRender(search_time_url, {
                    timeS: $("#timeS").val(),
                    timeE: $("#timeE").val()
                });
            });

            // 关键词搜索
            $('#search_data').click(function () {
                const keyword = $("#value").val().trim();
                if (!keyword) {
                    alert('请输入搜索关键词');
                    return;
                }
                fetchAndRender(search_data_url, {value: keyword});
            });

            // 回车搜索
            $('#value').keypress(function (e) {
                if (e.which === 13) {
                    $('#search_data').click();
                }
            });
        });
    </script>
{% endblock %}
