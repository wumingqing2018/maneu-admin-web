{% extends 'maneu/base.html' %}
{% load static %}

{% block css %}
    <link href="{% static 'css/maneu_store/insert20260606.css' %}" rel="stylesheet">
{% endblock %}

{% block content %}
    <div class="main-content-wrapper">
        <div class="page-header">
            <h1 class="page-title">
                <i class="bi bi-plus-circle-dotted"></i> 新增定制记录
            </h1>
            <a href="{% url 'maneu_store:index' %}" class="btn-back">
                <i class="bi bi-arrow-left"></i> 返回列表
            </a>
        </div>

        <!-- 1. 客户信息卡片（可折叠详细参数） -->
        <div class="section-card" id="guestSection">
            <div class="section-title d-flex justify-content-between align-items-center flex-wrap gap-2">
                <span><i class="bi bi-person-vcard"></i> 客户信息</span>
                <div class="d-flex gap-2">
                    <button class="btn-toggle" id="toggleGuest" type="button">
                        <i class="bi bi-chevron-down"></i> 详细参数
                    </button>
                </div>
            </div>

            <!-- 核心字段 -->
            <div class="row g-3 mb-2">
                <div class="col-md-4">
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-calendar"></i></span>
                        <input autocomplete="off" type="datetime-local" class="form-control" id="time" value="{{ time }}">
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input autocomplete="off" type="text" class="form-control" id="name" placeholder="客户姓名">
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-telephone"></i></span>
                        <input autocomplete="off" type="text" class="form-control" id="phone" placeholder="联系电话">
                    </div>
                </div>
            </div>

            <!-- 详细参数区域（可折叠） -->
            <div id="guestExtra" style="display: none;">
                <div class="row g-3 mb-3">
                    <div class="col-md-4">
                        <label class="form-label small fw-bold text-muted">性别</label>
                        <input autocomplete="off" type="text" class="form-control" id="sex" list="sexList" placeholder="例如：男">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small fw-bold text-muted">年龄</label>
                        <input autocomplete="off" type="text" class="form-control" id="age" placeholder="例如：28">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small fw-bold text-muted">眼位</label>
                        <input autocomplete="off" type="text" class="form-control" id="ot" list="otList" placeholder="例如：正视">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small fw-bold text-muted">主视眼</label>
                        <input autocomplete="off" type="text" class="form-control" id="em" list="emList" placeholder="左眼 / 右眼">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label small fw-bold text-muted">病族史</label>
                        <input autocomplete="off" type="text" class="form-control" id="dfh" list="dfhList" placeholder="无 / 有">
                    </div>
                </div>
            </div>

            <!-- 客户备注 -->
            <div class="row g-3">
                <div class="col-12">
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-chat-left-text"></i></span>
                        <input autocomplete="off" type="text" class="form-control" id="remark" placeholder="备注信息">
                    </div>
                </div>
            </div>
        </div>


        <!-- 2. 产品信息卡片（12组键值对，默认展开，可折叠） -->
        <div class="section-card" id="storeSection">
            <div class="section-title d-flex justify-content-between align-items-center flex-wrap gap-2">
                <span><i class="bi bi-box-seam"></i> 定制产品信息</span>
                <div class="d-flex gap-2">
                    <button class="btn-toggle" id="toggleProduct" type="button">
                        <i class="bi bi-chevron-down"></i> 详细参数
                    </button>
                </div>
            </div>

            <div class="col-md-6" id="productExtra">
                <!-- 12组键值对 -->
                <div class="kv-row"><input type="text" class="kv-key" id="key1" placeholder="参数名"><span class="kv-sep">:</span><input type="text" class="kv-val" id="val1" placeholder="参数值"></div>
                <div class="kv-row"><input type="text" class="kv-key" id="key2" placeholder="参数名"><span class="kv-sep">:</span><input type="text" class="kv-val" id="val2" placeholder="参数值"></div>
                <div class="kv-row"><input type="text" class="kv-key" id="key3" placeholder="参数名"><span class="kv-sep">:</span><input type="text" class="kv-val" id="val3" placeholder="参数值"></div>
                <div class="kv-row"><input type="text" class="kv-key" id="key4" placeholder="参数名"><span class="kv-sep">:</span><input type="text" class="kv-val" id="val4" placeholder="参数值"></div>
                <div class="kv-row"><input type="text" class="kv-key" id="key5" placeholder="参数名"><span class="kv-sep">:</span><input type="text" class="kv-val" id="val5" placeholder="参数值"></div>
                <div class="kv-row"><input type="text" class="kv-key" id="key6" placeholder="参数名"><span class="kv-sep">:</span><input type="text" class="kv-val" id="val6" placeholder="参数值"></div>
                <div class="kv-row"><input type="text" class="kv-key" id="key7" placeholder="参数名"><span class="kv-sep">:</span><input type="text" class="kv-val" id="val7" placeholder="参数值"></div>
                <div class="kv-row"><input type="text" class="kv-key" id="key8" placeholder="参数名"><span class="kv-sep">:</span><input type="text" class="kv-val" id="val8" placeholder="参数值"></div>
                <div class="kv-row"><input type="text" class="kv-key" id="key9" placeholder="参数名"><span class="kv-sep">:</span><input type="text" class="kv-val" id="val9" placeholder="参数值"></div>
                <div class="kv-row"><input type="text" class="kv-key" id="key10" placeholder="参数名"><span class="kv-sep">:</span><input type="text" class="kv-val" id="val10" placeholder="参数值"></div>
                <div class="kv-row"><input type="text" class="kv-key" id="key11" placeholder="参数名"><span class="kv-sep">:</span><input type="text" class="kv-val" id="val11" placeholder="参数值"></div>
                <div class="kv-row"><input type="text" class="kv-key" id="key12" placeholder="参数名"><span class="kv-sep">:</span><input type="text" class="kv-val" id="val12" placeholder="参数值"></div>
                <small class="text-muted d-block mt-2">
                    <i class="bi bi-info-circle"></i> 填写12组自定义产品参数，参数名不能重复，留空则不保存。
                </small>
            </div>
        </div>


        <!-- 3. 底部操作栏 -->
        <div class="action-bar justify-content-end">
            <button class="btn btn-outline-primary btn-back-page" id="submitOrderBtn" type="button">
                <i class="bi bi-check-lg"></i> 提交订单
            </button>
        </div>
    </div>
{% endblock %}

{% block javascript %}
    <script>
        // ==================== 全局配置与工具函数 ====================
        // API 端点（由 Django 模板反向解析）
        const STORE_INSERT_API = "{% url 'maneu_store:api_insert' %}";

        // 获取 CSRF Token（为后续可能的 POST 请求预留，当前使用 GET，但保持风格统一）
        function getCSRFToken() {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, 10) === 'csrftoken=') {
                        cookieValue = decodeURIComponent(cookie.substring(10));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        // 通用错误提示（风格与订单管理页保持一致）
        function showError(message) {
            alert(message || '操作失败，请稍后重试');
        }

        // ==================== 防重复提交控制 ====================
        let isSubmitting = false;

        function setSubmitting(btn, state, originalText = null) {
            isSubmitting = state;
            if (btn) {
                if (state) {
                    btn.prop('disabled', true);
                    btn.data('original-text', btn.html());
                    btn.html('<span class="spinner-border spinner-border-sm me-1" role="status"></span> 提交中...');
                } else {
                    btn.prop('disabled', false);
                    if (btn.data('original-text')) {
                        btn.html(btn.data('original-text'));
                    }
                }
            }
        }

        // ==================== 表单验证 ====================
        function validateForm() {
            const name = $('#name').val().trim();
            const phone = $('#phone').val().trim();

            if (!name) {
                showError('请填写客户姓名');
                $('#name').focus();
                return false;
            }
            if (!phone) {
                showError('请填写联系电话');
                $('#phone').focus();
                return false;
            }
            // 简单手机号验证（可根据需要调整）
            const phoneRegex = /^1[3-9]\d{9}$|^\d{7,15}$/;
            if (!phoneRegex.test(phone)) {
                showError('请输入有效的联系电话');
                $('#phone').focus();
                return false;
            }
            return true;
        }

        // ==================== 收集产品参数 ====================
        function collectCustomData() {
            const keys = [];
            const customObj = {};
            for (let i = 1; i <= 12; i++) {
                const key = $(`#key${i}`).val().trim();
                const val = $(`#val${i}`).val().trim();
                if (key === '') continue;
                if (keys.includes(key)) {
                    showError(`产品参数名"${key}"重复，请修改后再提交。`);
                    return null;
                }
                keys.push(key);
                customObj[key] = val;
            }
            return [customObj];
        }

        // ==================== 提交订单 ====================
        function submitOrder() {
            // 防重复提交
            if (isSubmitting) return;

            // 表单验证
            if (!validateForm()) return;

            // 收集产品参数
            const storeData = collectCustomData();
            if (storeData === null) return;

            // 构建请求数据
            const requestData = {
                time: $('#time').val(),
                name: $('#name').val().trim(),
                phone: $('#phone').val().trim(),
                age: $('#age').val().trim(),
                sex: $('#sex').val().trim(),
                dfh: $('#dfh').val().trim(),
                ot: $('#ot').val().trim(),
                em: $('#em').val().trim(),
                remark: $('#remark').val().trim(),
                storeContent: JSON.stringify(storeData)
            };

            const $submitBtn = $('#submitOrderBtn');
            setSubmitting($submitBtn, true);

            $.ajax({
                url: STORE_INSERT_API,
                method: 'POST',      // 保持与原代码一致（后端接口为 GET）
                data: requestData,
                success: function(res) {
                    setSubmitting($submitBtn, false);
                    if (res.status === true) {
                        alert('记录提交成功');
                        // 可选：提交成功后重置表单（保留时间默认值）
                        $('#name, #phone, #remark, #age, #sex, #dfh, #ot, #em').val('');
                        for (let i = 1; i <= 12; i++) {
                            $(`#key${i}`).val('');
                            $(`#val${i}`).val('');
                        }
                        $('#name').focus();
                    } else {
                        showError('提交失败：' + (res.message || '未知错误'));
                    }
                },
                error: function(xhr) {
                    setSubmitting($submitBtn, false);
                    showError('网络错误，请稍后重试');
                }
            });
        }

        // ==================== 折叠面板切换 ====================
        function setupToggle(triggerId, panelId) {
            $(triggerId).on('click', function() {
                const $panel = $(panelId);
                $panel.slideToggle(200);
                $(this).find('i').toggleClass('bi-chevron-down bi-chevron-up');
            });
        }

        // ==================== 页面初始化 ====================
        $(function() {
            // 初始化折叠面板
            setupToggle('#toggleGuest', '#guestExtra');
            setupToggle('#toggleProduct', '#productExtra');

            // 绑定提交按钮事件
            $('#submitOrderBtn').on('click', submitOrder);

            // 可选：支持按回车键快速提交（在表单输入框内按回车）
            $('#guestSection input, #storeSection input').on('keypress', function(e) {
                if (e.which === 13) {
                    e.preventDefault();
                    submitOrder();
                }
            });
        });
    </script>
{% endblock %}
