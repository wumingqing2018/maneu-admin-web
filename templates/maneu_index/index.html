{% extends 'maneu/base.html' %}
{% load static %}

{% block css %}
    <style>
        /* 设计变量与列表页、订单页保持统一 */
        :root {
            --store-accent: hsl(38, 92%, 55%);
            --store-surface: #ffffff;
            --store-border: #e8ecf1;
            --store-text: #1e293b;
            --store-muted: #64748b;
            --store-radius: 12px;
            --store-shadow: 0 4px 12px rgba(0, 0, 0, 0.04), 0 1px 3px rgba(0, 0, 0, 0.03);
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
            margin-bottom: 1.8rem;
        }

        .page-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--brand-color);
            letter-spacing: -0.02em;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin: 0;
        }

        .page-title i {
            font-size: 2rem;
            color: var(--brand-accent);
        }

        /* 图表卡片 - 与 form-card 风格完全相同 */
        .chart-card {
            background: var(--store-surface);
            border: 1px solid var(--store-border);
            border-radius: var(--store-radius);
            box-shadow: var(--store-shadow);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .chart-card .chart-title {
            font-weight: 600;
            font-size: 1rem;
            color: var(--store-text);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .chart-card .chart-title i {
            color: var(--brand-accent);
            font-size: 1.2rem;
        }

        /* 图表容器 */
        .chart-container {
            width: 100%;
            height: 300px;
        }

        .chart-container-lg {
            height: 350px;
        }
    </style>
{% endblock %}

{% block content %}
    <div class="main-content-wrapper">
        <!-- 页面标题 -->
        <div class="page-header">
            <h1 class="page-title">
                <i class="bi bi-bar-chart-line"></i> 验光数据可视化面板
            </h1>
        </div>

        <!-- 视力分布 -->
        <div class="row g-4">
            <div class="col-md-6">
                <div class="chart-card">
                    <div class="chart-title"><i class="bi bi-eye"></i> 右眼视力分布</div>
                    <div id="od-va-chart" class="chart-container"></div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="chart-card">
                    <div class="chart-title"><i class="bi bi-eye"></i> 左眼视力分布</div>
                    <div id="os-va-chart" class="chart-container"></div>
                </div>
            </div>
        </div>

        <!-- 球镜 & 柱镜 -->
        <div class="row g-4">
            <div class="col-md-6">
                <div class="chart-card">
                    <div class="chart-title"><i class="bi bi-circle"></i> 球镜度数分布 (SPH)</div>
                    <div id="sph-chart" class="chart-container"></div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="chart-card">
                    <div class="chart-title"><i class="bi bi-circle-half"></i> 柱镜度数分布 (CYL)</div>
                    <div id="cyl-chart" class="chart-container"></div>
                </div>
            </div>
        </div>

        <!-- 散光轴位玫瑰图 -->
        <div class="row g-4">
            <div class="col-md-6">
                <div class="chart-card">
                    <div class="chart-title"><i class="bi bi-compass"></i> 右眼散光轴位分布</div>
                    <div id="od-ax-chart" class="chart-container-lg"></div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="chart-card">
                    <div class="chart-title"><i class="bi bi-compass"></i> 左眼散光轴位分布</div>
                    <div id="os-ax-chart" class="chart-container-lg"></div>
                </div>
            </div>
        </div>

        <!-- 眼轴长度 -->
        <div class="row g-4">
            <div class="col-md-6">
                <div class="chart-card">
                    <div class="chart-title"><i class="bi bi-rulers"></i> 右眼眼轴长度分布</div>
                    <div id="od-al-chart" class="chart-container"></div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="chart-card">
                    <div class="chart-title"><i class="bi bi-rulers"></i> 左眼眼轴长度分布</div>
                    <div id="os-al-chart" class="chart-container"></div>
                </div>
            </div>
        </div>

        <!-- 角膜曲率散点图 -->
        <div class="row g-4">
            <div class="col-12">
                <div class="chart-card">
                    <div class="chart-title"><i class="bi bi-graph-up"></i> 角膜曲率对比 (右眼 vs 左眼)</div>
                    <div id="ak-scatter-chart" class="chart-container-lg"></div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}

{% block javascript %}
    <!-- 引入 ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script>
        // 从 Django 上下文获取数据（安全输出）
        const odVaCat = {{ od_va_cat|safe }};
        const osVaCat = {{ os_va_cat|safe }};
        const odSph = {{ od_sph|safe }};
        const osSph = {{ os_sph|safe }};
        const odCyl = {{ od_cyl|safe }};
        const osCyl = {{ os_cyl|safe }};
        const odAx = {{ od_ax|safe }};
        const osAx = {{ os_ax|safe }};
        const odAl = {{ od_al|safe }};
        const osAl = {{ os_al|safe }};
        const odAk = {{ od_ak|safe }};
        const osAk = {{ os_ak|safe }};

        // 辅助函数：生成直方图数据
        function histogramData(data, binCount = 10) {
            if (!data || data.length === 0) return {categories: [], values: []};
            const min = Math.min(...data);
            const max = Math.max(...data);
            const step = (max - min) / binCount || 1;
            const bins = Array(binCount).fill(0);
            const categories = [];
            for (let i = 0; i < binCount; i++) {
                let low = (min + i * step).toFixed(1);
                let high = (min + (i + 1) * step).toFixed(1);
                categories.push(`${low}~${high}`);
            }
            data.forEach(v => {
                let idx = Math.floor((v - min) / step);
                if (idx >= binCount) idx = binCount - 1;
                bins[idx]++;
            });
            return {categories, values: bins};
        }

        // 1. 视力分布
        function drawVaChart(domId, catData) {
            const el = document.getElementById(domId);
            if (!el) return;
            const chart = echarts.init(el);
            chart.setOption({
                tooltip: {trigger: 'axis'},
                xAxis: {data: Object.keys(catData), axisLabel: {rotate: 0}},
                yAxis: {name: '人数'},
                series: [{type: 'bar', data: Object.values(catData), itemStyle: {color: '#5470C6'}}]
            });
            return chart;
        }

        drawVaChart('od-va-chart', odVaCat);
        drawVaChart('os-va-chart', osVaCat);

        // 2. 球镜直方图
        const odSphHist = histogramData(odSph, 12);
        const osSphHist = histogramData(osSph, 12);
        const sphChart = echarts.init(document.getElementById('sph-chart'));
        sphChart.setOption({
            tooltip: {trigger: 'axis'},
            legend: {data: ['右眼', '左眼']},
            xAxis: {data: odSphHist.categories},
            yAxis: {name: '人数'},
            series: [
                {name: '右眼', type: 'bar', data: odSphHist.values},
                {name: '左眼', type: 'bar', data: osSphHist.values}
            ]
        });

        // 3. 柱镜直方图
        const odCylHist = histogramData(odCyl, 10);
        const osCylHist = histogramData(osCyl, 10);
        const cylChart = echarts.init(document.getElementById('cyl-chart'));
        cylChart.setOption({
            tooltip: {trigger: 'axis'},
            legend: {data: ['右眼', '左眼']},
            xAxis: {data: odCylHist.categories},
            yAxis: {name: '人数'},
            series: [
                {name: '右眼', type: 'bar', data: odCylHist.values},
                {name: '左眼', type: 'bar', data: osCylHist.values}
            ]
        });

        // 4. 轴位极坐标图
        function polarHistogram(data) {
            const sectors = 12;
            const count = new Array(sectors).fill(0);
            data.forEach(angle => {
                let idx = Math.floor(angle / (180 / sectors));
                if (idx >= sectors) idx = sectors - 1;
                count[idx]++;
            });
            const result = [];
            for (let i = 0; i < sectors; i++) {
                result.push({name: `${i * 15}°~${(i + 1) * 15}°`, value: count[i]});
            }
            return result;
        }

        const odAxPolar = polarHistogram(odAx);
        const osAxPolar = polarHistogram(osAx);

        function drawPolarChart(domId, data) {
            const chart = echarts.init(document.getElementById(domId));
            chart.setOption({
                angleAxis: {type: 'category', data: data.map(d => d.name)},
                radiusAxis: {},
                polar: {},
                series: [{
                    type: 'bar',
                    data: data.map(d => d.value),
                    coordinateSystem: 'polar',
                    itemStyle: {color: '#91cc75'}
                }]
            });
            return chart;
        }

        drawPolarChart('od-ax-chart', odAxPolar);
        drawPolarChart('os-ax-chart', osAxPolar);

        // 5. 眼轴长度直方图
        function drawAlHistogram(domId, data) {
            const hist = histogramData(data, 10);
            const chart = echarts.init(document.getElementById(domId));
            chart.setOption({
                tooltip: {trigger: 'axis'},
                xAxis: {data: hist.categories},
                yAxis: {name: '人数'},
                series: [{type: 'bar', data: hist.values, itemStyle: {color: '#fc8452'}}]
            });
            return chart;
        }

        drawAlHistogram('od-al-chart', odAl);
        drawAlHistogram('os-al-chart', osAl);

        // 6. 角膜曲率散点图
        const akPairs = [];
        const length = Math.min(odAk.length, osAk.length);
        for (let i = 0; i < length; i++) {
            akPairs.push([odAk[i], osAk[i]]);
        }
        const akScatter = echarts.init(document.getElementById('ak-scatter-chart'));
        akScatter.setOption({
            tooltip: {
                trigger: 'item',
                formatter: p => `右眼: ${p.value[0]}<br/>左眼: ${p.value[1]}`
            },
            xAxis: {name: '右眼角膜曲率 (D)'},
            yAxis: {name: '左眼角膜曲率 (D)'},
            series: [{
                type: 'scatter',
                data: akPairs,
                symbolSize: 6,
                itemStyle: {color: '#5470C6'}
            }]
        });

        // 响应式缩放
        window.addEventListener('resize', () => {
            ['od-va-chart', 'os-va-chart', 'sph-chart', 'cyl-chart', 'od-ax-chart', 'os-ax-chart',
                'od-al-chart', 'os-al-chart', 'ak-scatter-chart'].forEach(id => {
                const instance = echarts.getInstanceByDom(document.getElementById(id));
                if (instance) instance.resize();
            });
        });
    </script>
{% endblock %}
