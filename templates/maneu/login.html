{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>徕可管理系统 · 登录</title>
    <link rel="icon" href="{% static 'images/maneu/logo.svg' %}">
    <link rel="stylesheet" href="{% static 'css/maneu/login.css' %}">
    <!-- Bootstrap 5 + Bootswatch Cerulean -->
    <link crossorigin="anonymous"
          href="https://cdnjs.cloudflare.com/ajax/libs/bootswatch/5.3.8/cerulean/bootstrap.min.css"
          integrity="sha512-3n/Isj9MCqCc1wf/QfjLigco9sx9xr9m3TqgxstJrSxmwZ05qjl4owbfkioZ0y3w8fNWcVLnJGHfVqKF/L1Qsw=="
          referrerpolicy="no-referrer" rel="stylesheet"/>

</head>

<body>

<!-- 科技感背景元素 -->
<div class="tech-bg"></div>
<div class="glow-orb orb-1"></div>
<div class="glow-orb orb-2"></div>

<!-- 主要内容 -->
<div class="main-content">
    <div class="login-card">
        <h1 class="brand-name">徕可管理系统</h1>
        <p class="brand-sub">Account Login</p>

        <!-- 手机号输入 -->
        <div class="input-group-custom">
            <input autocomplete="off" class="input-item" id="call" placeholder="手机号码" type="text">
            <span class="msg" id="msg"></span>
        </div>

        <!-- 验证码输入 -->
        <div class="input-group-custom" id="password">
            <input autocomplete="off" class="input-item" id="code" placeholder="验证码" type="text">
        </div>

        <!-- 登录按钮（动态显示） -->
        <button class="btn-custom btn-disabled" id="login-hold" style="display: none;">请输入验证码后再登录</button>
        <button class="btn-custom btn-gold" id="login-btn">登录</button>

        <!-- 获取验证码按钮区域 -->
        <button class="btn-custom btn-outline-light" id="sendsms-btn">获取验证码</button>
        <button class="btn-custom btn-disabled" id="wait-btn" style="display: none;">请稍后再获取验证码</button>

        <!-- 返回首页链接 -->
        <a href="{% url 'index' %}" class="back-link">返回首页</a>
    </div>
</div>

<!-- 页脚备案 -->
<footer class="footer">
    <a href="https://beian.miit.gov.cn" target="_blank" rel="noopener">粤ICP备2023070483号</a>
</footer>

<script>
    // 后端路由地址
    const sendsms = "{% url 'sendsms' %}";
    const login_verify = "{% url 'login_api' %}";
    const maneu_index_index = "{% url 'maneu_index:index' %}";
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/2.11.8/umd/popper.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/js/bootstrap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="{% static 'javascript/maneu/login.js' %}"></script>
</body>
</html>
