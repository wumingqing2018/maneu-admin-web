{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <title>徕可</title>
    <link href="{% static 'images/maneu/logo.svg' %}" rel="icon">
    <link href="{% static 'css/maneu/login.css' %}" rel="stylesheet">
    <meta content="width=device-width, initial-scale=1" name="viewport">

    <!-- 新 Bootstrap5 核心 CSS 文件 -->
    <link crossorigin="anonymous"
          href="https://cdnjs.cloudflare.com/ajax/libs/bootswatch/5.3.8/cerulean/bootstrap.min.css"
          integrity="sha512-3n/Isj9MCqCc1wf/QfjLigco9sx9xr9m3TqgxstJrSxmwZ05qjl4owbfkioZ0y3w8fNWcVLnJGHfVqKF/L1Qsw=="
          referrerpolicy="no-referrer" rel="stylesheet"/>
    <!--  popper.min.js 用于弹窗、提示、下拉菜单 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/2.11.8/umd/popper.min.js"></script>
    <!-- 最新的 Bootstrap5 核心 JavaScript 文件 -->
    <script crossorigin="anonymous"
            integrity="sha512-nKXmKvJyiGQy343jatQlzDprflyB5c+tKCzGP3Uq67v+lmzfnZUi/ZT+fc6ITZfSC5HhaBKUIvr/nTLCV+7F+Q=="
            referrerpolicy="no-referrer" src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/js/bootstrap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    
    <script>
        sendsms = "{% url 'sendsms' %}"
        login_verify = "{% url 'login_api' %}"
        maneu_order_index = "{% url 'maneu_order:index' %}"
    </script>
    <script src="{% static 'javascript/maneu_login.js' %}"></script>
</head>

<body>
<div class="container-fluid">
    <div class="login-wrapper">
        <div class="header">徕可管理系统</div>
        <div class="form-wrapper">
            <input autocomplete="off" class="input-item" id="call" placeholder="手机号码" type="text">
            <span class="msg" id="msg"></span>
        </div>

        <div class="form-wrapper" id="password">
            <input autocomplete="off" class="input-item" id="code" placeholder="验证码" type="text">
            <button class="btn" id="login-hold" style="background: gray; color: white;">请输入验证码后再登陆</button>
            <button class="btn" id="login-btn" style="display: none">登录</button>

        </div>
        <div class="form-wrapper">
            <button class="btn" id="wait-btn" style="background: gray; color: white; display: none">请稍后再获取验证码
            </button>
            <button class="btn" id="sendsms-btn">获取验证码</button>
        </div>
        <div class="form-wrapper">
            <a href="{% url 'index' %}">
                <button class="btn">返回</button>
            </a>
        </div>
    </div>
</div>
</body>

<footer class="fixed-bottom text-center">
    <a href="https://beian.miit.gov.cn">粤ICP备2023070483号</a>
</footer>
</html>
