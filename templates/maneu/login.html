{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>徕可管理系统 · 登录</title>
    <link rel="icon" href="{% static 'images/maneu/logo.svg' %}">
    <link rel="stylesheet" href="{% static 'css/maneu/login.css' %}">
    <!-- Bootstrap 5 + Bootswatch Cerulean -->
    <link crossorigin="anonymous"
          href="https://cdnjs.cloudflare.com/ajax/libs/bootswatch/5.3.8/cerulean/bootstrap.min.css"
          integrity="sha512-3n/Isj9MCqCc1wf/QfjLigco9sx9xr9m3TqgxstJrSxmwZ05qjl4owbfkioZ0y3w8fNWcVLnJGHfVqKF/L1Qsw=="
          referrerpolicy="no-referrer" rel="stylesheet"/>
    <!-- 先加载 jQuery 和 Bootstrap JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/js/bootstrap.min.js"></script>
</head>
<body>

<!-- 科技感背景元素（保持原样） -->
<div class="tech-bg"></div>
<div class="glow-orb orb-1"></div>
<div class="glow-orb orb-2"></div>

<div class="main-content">
    <div class="login-card">
        <h1 class="brand-name">徕可管理系统</h1>
        <p class="brand-sub">Account Login</p>

        <!-- 手机号输入 -->
        <div class="input-group-custom">
            <input autocomplete="off" class="input-item" id="call" placeholder="手机号码" type="tel" maxlength="11">
            <span class="msg" id="msg"></span>
        </div>

        <!-- 验证码输入 -->
        <div class="input-group-custom" id="password">
            <input autocomplete="off" class="input-item" id="code" placeholder="验证码" type="text" maxlength="6">
        </div>

        <!-- 登录按钮（动态显示） -->
        <button class="btn-custom btn-disabled" id="login-hold" style="display: none;">请输入验证码后再登录</button>
        <button class="btn-custom btn-gold" id="login-btn" style="display: none;">登录</button>

        <!-- 获取验证码按钮区域 -->
        <button class="btn-custom btn-outline-light" id="sendsms-btn">获取验证码</button>
        <button class="btn-custom btn-disabled" id="wait-btn" style="display: none;">60秒后可重试</button>

        <a href="{% url 'index' %}" class="back-link">返回首页</a>
    </div>
</div>

<footer class="footer">
    <a href="https://beian.miit.gov.cn" target="_blank" rel="noopener">粤ICP备2023070483号</a>
</footer>

<script>
    // ========================================================================
    // 1. 工具函数
    // ========================================================================

    /**
     * 从 Cookie 中获取 Django CSRF Token
     */
    function getCsrfToken() {
        return document.cookie.split('; ')
            .find(row => row.startsWith('csrftoken='))
            ?.split('=')[1];
    }

    /**
     * 校验手机号格式（中国大陆 11 位，以 1 开头，第二位 3-9）
     */
    function isValidPhone(phone) {
        return /^1[3-9]\d{9}$/.test(phone);
    }

    /**
     * 显示提示消息（支持颜色）
     */
    function showMessage(text, color = '#ff6b6b') {
        $('#msg').text(text).css('color', color);
    }

    // ========================================================================
    // 2. API 端点（由 Django 模板反向解析）
    // ========================================================================

    const sendsmsUrl = "{% url 'sendsms' %}";
    const loginApiUrl = "{% url 'access_token' %}";
    const redirectUrl = "{% url 'maneu_index:index' %}";

    // ========================================================================
    // 3. 页面初始化 & DOM 缓存
    // ========================================================================

    $(document).ready(function () {
        const $call = $('#call');
        const $code = $('#code');
        const $msg = $('#msg');
        const $sendsmsBtn = $('#sendsms-btn');
        const $waitBtn = $('#wait-btn');
        const $loginHold = $('#login-hold');
        const $loginBtn = $('#login-btn');

        let countdownTimer = null;   // 倒计时定时器句柄
        let countdownSeconds = 0;    // 当前倒计时秒数

        // ====================================================================
        // 4. 登录按钮状态控制（验证码为空时禁用）
        // ====================================================================

        function toggleLoginButton() {
            const code = $code.val().trim();
            if (code === '') {
                $loginHold.show();
                $loginBtn.hide();
            } else {
                $loginHold.hide();
                $loginBtn.show();
            }
        }

        // 初始化按钮状态，并监听验证码输入变化
        toggleLoginButton();
        $code.on('input', toggleLoginButton);

        // ====================================================================
        // 5. 验证码倒计时管理
        // ====================================================================

        /**
         * 启动倒计时（禁用发送按钮，显示等待提示）
         * @param {number} seconds - 倒计时总秒数
         */
        function startCountdown(seconds) {
            if (countdownTimer) clearInterval(countdownTimer);
            countdownSeconds = seconds;
            $sendsmsBtn.hide();
            $waitBtn.show();
            $waitBtn.text(`${countdownSeconds}秒后可重试`);

            countdownTimer = setInterval(function () {
                countdownSeconds--;
                if (countdownSeconds <= 0) {
                    clearInterval(countdownTimer);
                    $waitBtn.hide();
                    $sendsmsBtn.show();
                    $sendsmsBtn.prop('disabled', false);  // 恢复发送按钮
                } else {
                    $waitBtn.text(`${countdownSeconds}秒后可重试`);
                }
            }, 1000);
        }

        // ====================================================================
        // 6. 发送验证码
        // ====================================================================

        $sendsmsBtn.on('click', function () {
            const phone = $call.val().trim();

            // 手机号格式校验
            if (!phone) {
                showMessage('请输入手机号码');
                return;
            }
            if (!isValidPhone(phone)) {
                showMessage('手机号格式不正确');
                return;
            }

            // 禁用按钮，防止重复点击（倒计时开始前就禁用）
            $sendsmsBtn.prop('disabled', true);

            $.ajax({
                url: sendsmsUrl,
                method: 'GET',
                data: { call: phone },
                success: function (res) {
                    if (res.status === true) {
                        showMessage('验证码已发送', '#4caf50');
                        startCountdown(60);   // 启动60秒倒计时
                    } else {
                        showMessage(res.message || '发送失败');
                        $sendsmsBtn.prop('disabled', false);  // 恢复按钮
                    }
                },
                error: function (xhr) {
                    const errMsg = xhr.responseJSON?.message || '网络错误，请稍后重试';
                    showMessage(errMsg);
                    $sendsmsBtn.prop('disabled', false);
                }
            });
        });

        // ====================================================================
        // 7. 登录
        // ====================================================================

        $loginBtn.on('click', function () {
            const phone = $call.val().trim();
            const code = $code.val().trim();

            // 校验手机号和验证码
            if (!phone || !code) {
                showMessage('请填写手机号和验证码');
                return;
            }
            if (!isValidPhone(phone)) {
                showMessage('手机号格式不正确');
                return;
            }

            // 登录中禁用按钮，防止重复提交
            $loginBtn.prop('disabled', true).text('登录中...');

            $.ajax({
                url: loginApiUrl,
                method: 'GET',
                data: { call: phone, code: code },
                success: function (res) {
                    if (res.status === true) {
                        // 保存 Token 到本地存储（根据实际返回结构调整）
                        if (res.content) {
                            localStorage.setItem('access_token', res.content.access_token);
                            localStorage.setItem('refresh_token', res.content.refresh_token);
                        } else {
                            // 兼容直接返回 access_token 的情况
                            localStorage.setItem('access_token', res.access_token);
                            localStorage.setItem('refresh_token', res.refresh_token);
                        }
                        window.location.href = redirectUrl;   // 跳转到目标页
                    } else {
                        showMessage(res.message || '登录失败');
                        $loginBtn.prop('disabled', false).text('登录');
                    }
                },
                error: function (xhr) {
                    const errMsg = xhr.responseJSON?.message || '登录请求失败，请稍后重试';
                    showMessage(errMsg);
                    $loginBtn.prop('disabled', false).text('登录');
                }
            });
        });
    });
</script>
</body>
</html>
